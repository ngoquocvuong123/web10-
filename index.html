<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS làm nổi bật thành phần URL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Phân tích thành phần URL</h1>

  <p class="url-box">
    <span class="protocol">https://</span><span class="domain">example.com</span><span class="path">/about/contact.html</span>
  </p>

  <ul class="legend">
    <li><span class="protocol">Protocol</span>: giao thức truyền tải (https://)</li>
    <li><span class="domain">Domain</span>: tên miền của website (example.com)</li>
    <li><span class="path">Path</span>: đường dẫn tới trang/tài nguyên cụ thể (/about/contact.html)</li>
  </ul>

  <footer>
    <p>Ngô Quốc Vượng</p>
  </footer>

</body>
</html>
